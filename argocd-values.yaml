# Helm values for ArgoCD installation
# Chart: argo/argo-cd (https://argoproj.github.io/argo-helm)

global:
  # Enable the default admin user
  admin.enabled: true

server:
  # Disable SSL on the server container itself, making local port-forwarding and Ingress setup simpler
  extraArgs:
    - --insecure
  service:
    type: ClusterIP

configs:
  # Configure general ArgoCD settings if needed
  cm:
    admin.enabled: "true"
    kustomize.buildOptions: "--enable-helm --load-restrictor=LoadRestrictionsNone"
  secret:
    argocdServerAdminPassword: "$2a$10$r00nWI22wqfHPoYXG2oa9ezv8fY41KwVOYeV9ewXNYKDvQxi9hcFm"

# Resource requests/limits configured for a lightweight local Kind testing environment
controller:
  resources:
    limits:
      cpu: 1000m
      memory: 1024Mi
    requests:
      cpu: 100m
      memory: 128Mi

repoServer:
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 50m
      memory: 128Mi
