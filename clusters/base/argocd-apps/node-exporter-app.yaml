apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: system-node-exporter
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/akinori47/argocd-workflow.git
    targetRevision: HEAD
    path: clusters/base/node-exporter
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
