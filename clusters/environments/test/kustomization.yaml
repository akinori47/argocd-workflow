apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# В тесте разворачиваем Ingress, Prometheus и Node Exporter
resources:
  - ../../base/argocd-apps/ingress-nginx-app.yaml
  - ../../base/argocd-apps/prometheus-app.yaml
  - ../../base/argocd-apps/node-exporter-app.yaml

patches:
  - target:
      kind: Application
      name: system-ingress-nginx
    patch: |-
      - op: replace
        path: /spec/source/path
        value: clusters/environments/test/ingress-nginx
  - target:
      kind: Application
      name: system-node-exporter
    patch: |-
      - op: replace
        path: /spec/source/path
        value: clusters/environments/test/node-exporter
  - target:
      kind: Application
      name: system-prometheus
    patch: |-
      - op: replace
        path: /spec/source/path
        value: clusters/environments/test/prometheus
